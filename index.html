<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballard Exploration</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Ballard palette */
      --navy:       #141c26;
      --navy-mid:   #1c2738;
      --navy-light: #243044;
      --border:     #2e3d52;
      --border-lit: #3d5068;

      --cream:      #e8dcc8;
      --cream-dim:  #b8a98e;
      --muted:      #7a8fa8;

      --amber:      #c8860a;
      --amber-glow: #e09b10;
      --amber-dim:  #7a5006;

      --green:      #4a8c5c;   /* visited — mossy PNW green */
      --red:        #9b3f2e;   /* not visited — weathered rust */

      --radius:     8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--navy);
      color: var(--cream);
      min-height: 100vh;
    }

    /* ════════════════════════════
       AUTH SCREEN
    ════════════════════════════ */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(200,134,10,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 10%, rgba(74,140,92,0.06) 0%, transparent 50%),
        var(--navy);
    }

    .auth-card {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    /* subtle nautical stripe top accent */
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--amber), var(--amber-glow), var(--amber));
    }

    .auth-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 10px;
    }

    .auth-card h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .auth-card p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.92rem;
      color: var(--cream);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(200,134,10,0.15);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--amber);
      color: var(--navy);
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 6px;
    }

    .btn:hover   { background: var(--amber-glow); }
    .btn:active  { transform: translateY(1px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #auth-error {
      color: #e07060;
      font-size: 0.82rem;
      margin-top: 14px;
      display: none;
      padding: 10px 12px;
      background: rgba(155,63,46,0.2);
      border: 1px solid rgba(155,63,46,0.4);
      border-radius: 5px;
    }

    /* ════════════════════════════
       MAIN APP
    ════════════════════════════ */
    #app { display: none; }

    header {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .header-brand h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.01em;
    }

    .header-brand .tagline {
      font-size: 0.72rem;
      color: var(--amber);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .user-email {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .btn-sm {
      padding: 6px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: 1px solid var(--border-lit);
      border-radius: 5px;
      background: transparent;
      color: var(--cream-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-sm:hover {
      border-color: var(--amber-dim);
      color: var(--amber);
    }

    main {
      padding: 28px 28px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ════════════════════════════
       MAP
    ════════════════════════════ */
    .map-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    #map {
      height: 460px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      z-index: 0;
      /* dark map filter to match theme */
      filter: brightness(0.88) saturate(0.75) contrast(1.05);
    }

    /* Legend overlay on map */
    .map-legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 999;
      background: rgba(20,28,38,0.88);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      gap: 16px;
      backdrop-filter: blur(6px);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--cream-dim);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.2);
    }

    /* ════════════════════════════
       TABLE SECTION
    ════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 28px 0 14px;
    }

    .section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--cream);
    }

    .section-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 16px;
    }

    .save-status {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }
    .save-status.saving { color: var(--amber); }
    .save-status.saved  { color: var(--green); }
    .save-status.error  { color: #e07060; }

    .table-wrap {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      background: var(--navy-light);
      padding: 11px 16px;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    /* amber accent on first th */
    thead th:first-child {
      color: var(--amber);
      border-left: 3px solid var(--amber);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(200,134,10,0.04); }

    tbody td {
      padding: 9px 16px;
      vertical-align: middle;
    }

    tbody td:first-child {
      border-left: 3px solid transparent;
      transition: border-color 0.15s;
    }

    tbody tr:hover td:first-child { border-left-color: var(--amber-dim); }

    tbody td input,
    tbody td select {
      width: 100%;
      padding: 6px 9px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--cream);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    tbody td input::placeholder { color: var(--muted); }

    tbody td input:hover,
    tbody td select:hover {
      border-color: var(--border-lit);
      background: var(--navy-light);
    }

    tbody td input:focus,
    tbody td select:focus {
      border-color: var(--amber);
      background: var(--navy-light);
      box-shadow: 0 0 0 2px rgba(200,134,10,0.12);
    }

    tbody td select option { background: var(--navy-mid); color: var(--cream); }

    /* Visited pill */
    .visited-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .rating-cell input { text-align: center; }

    .table-placeholder {
      padding: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.04em;
    }

    /* Leaflet popup dark theme */
    .leaflet-popup-content-wrapper {
      background: var(--navy-mid) !important;
      border: 1px solid var(--border-lit) !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
      color: var(--cream) !important;
    }

    .leaflet-popup-tip {
      background: var(--navy-mid) !important;
    }

    .leaflet-popup-close-button {
      color: var(--muted) !important;
    }

    /* Leaflet controls dark */
    .leaflet-control-zoom a {
      background: var(--navy-mid) !important;
      color: var(--cream) !important;
      border-color: var(--border) !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--navy-light) !important;
      color: var(--amber) !important;
    }

    .leaflet-control-attribution {
      background: rgba(20,28,38,0.75) !important;
      color: var(--muted) !important;
    }

    .leaflet-control-attribution a { color: var(--amber-dim) !important; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-eyebrow">⚓ Ballard, Seattle</div>
    <h1>The Exploration Log</h1>
    <p>Sign in to view the map and update ratings for our favorite spots.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="sign-in-btn" onclick="signIn()">Sign In</button>
    <div id="auth-error"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════ -->
<div id="app">
  <header>
    <div class="header-brand">
      <h1>⚓ The Exploration Log</h1>
      <span class="tagline">Ballard, Seattle</span>
    </div>
    <div class="header-right">
      <span class="user-email" id="user-email-display"></span>
      <button class="btn-sm" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <main>
    <!-- Map -->
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--green)"></div>
          Visited
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:var(--red)"></div>
          Not Yet
        </div>
      </div>
    </div>

    <!-- Table -->
    <div class="section-header">
      <span class="section-title">Businesses</span>
      <div class="section-rule"></div>
      <span class="save-status" id="save-status"></span>
    </div>

    <div class="table-wrap">
      <table id="biz-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Category</th>
            <th>Lat, Lon</th>
            <th>Visited</th>
            <th>Dog Friendly</th>
            <th>Mira Rating</th>
            <th>Mira Review</th>
            <th>Luke Rating</th>
            <th>Luke Review</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="9" class="table-placeholder">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<script>
// ══════════════════════════════════════════
// CONFIGURATION — replace these placeholders
// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://gyquubxmgqomozxjxmtl.supabase.co';
const SUPABASE_ANON = 'sb_publishable_R8o2fSkld3S-Po_oPSfJ6g_x0k6G-6p';
const TABLE_NAME    = 'BallardBusinesses';

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

let map, rows = [], markers = {};

supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) showApp(session.user);
});

supabase.auth.onAuthStateChange((_event, session) => {
  if (session) showApp(session.user);
  else         showAuth();
});

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('sign-in-btn');
  const errEl    = document.getElementById('auth-error');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  btn.textContent = 'Sign In';

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  }
}

async function signOut() { await supabase.auth.signOut(); }

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') signIn();
});

// ══════════════════════════════════════════
// SHOW / HIDE SCREENS
// ══════════════════════════════════════════
function showApp(user) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-email-display').textContent = user.email;
  if (!map) initMap();
  loadData();
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ══════════════════════════════════════════
// MAP
// ══════════════════════════════════════════
function initMap() {
  map = L.map('map').setView([47.6762, -122.3839], 14);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);
}

function makeIcon(visited) {
  const color  = (visited === 'Y') ? '#4a8c5c' : '#9b3f2e';
  const inner  = (visited === 'Y') ? '#7ec89a' : '#e07060';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8.94 13 21 13 21S26 21.94 26 13C26 5.82 20.18 0 13 0z"
      fill="${color}" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <circle cx="13" cy="13" r="5.5" fill="${inner}" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize:    [26, 34],
    iconAnchor:  [13, 34],
    popupAnchor: [0, -36]
  });
}

function parseLatLon(val) {
  if (!val) return null;
  const parts = String(val).split(',').map(s => parseFloat(s.trim()));
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) return { lat: parts[0], lon: parts[1] };
  return null;
}

function buildPopup(row) {
  const mira       = row['Mira Rating'] ?? '—';
  const luke       = row['Luke Rating'] ?? '—';
  const miraReview = row['Mira Review'] || '';
  const lukeReview = row['Luke Review'] || '';
  const visited    = row['Visited'] === 'Y';
  const dogFriendly = row['Dog Friendly'];
  const category   = row['Category'] || '';
  return `
    <div style="min-width:190px;font-family:'Inter',sans-serif">
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:1rem;font-weight:700;color:#e8dcc8;margin-bottom:2px">
        ${escHtml(row['Name'] || '')}
      </div>
      ${category ? `<div style="font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:#7a8fa8;margin-bottom:8px">${escHtml(category)}</div>` : ''}
      <div style="display:flex;gap:10px;margin-bottom:12px;align-items:center">
        <span style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:${visited ? '#4a8c5c' : '#9b3f2e'}">
          ${visited ? '● Visited' : '○ Not yet'}
        </span>
        ${dogFriendly === 'Y' ? '<span style="font-size:0.75rem">🐾 Dog friendly</span>' : ''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:8px">
          <div style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:#7a8fa8;margin-bottom:3px">Mira</div>
          <div style="font-size:1.1rem;font-weight:700;color:#e8dcc8;margin-bottom:${miraReview ? '4px' : '0'}">${escHtml(String(mira))}</div>
          ${miraReview ? `<div style="font-size:0.75rem;color:#b8a98e;line-height:1.4">${escHtml(miraReview)}</div>` : ''}
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:8px">
          <div style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:#7a8fa8;margin-bottom:3px">Luke</div>
          <div style="font-size:1.1rem;font-weight:700;color:#e8dcc8;margin-bottom:${lukeReview ? '4px' : '0'}">${escHtml(String(luke))}</div>
          ${lukeReview ? `<div style="font-size:0.75rem;color:#b8a98e;line-height:1.4">${escHtml(lukeReview)}</div>` : ''}
        </div>
      </div>
    </div>`;
}

function renderMarkers() {
  Object.values(markers).forEach(m => m.remove());
  markers = {};
  rows.forEach(row => {
    const pos = parseLatLon(row['latlon']);
    if (!pos) return;
    markers[row.id] = L.marker([pos.lat, pos.lon], { icon: makeIcon(row['Visited']) })
      .bindPopup(buildPopup(row))
      .addTo(map);
  });
}

// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
async function loadData() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="9" class="table-placeholder">Loading spots…</td></tr>';

  const { data, error } = await supabase
    .from(TABLE_NAME)
    .select('*')
    .order('Name', { ascending: true });

  if (error) {
    tbody.innerHTML = `<tr><td colspan="9" class="table-placeholder" style="color:#e07060">Error: ${escHtml(error.message)}</td></tr>`;
    return;
  }

  rows = data || [];
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="9" class="table-placeholder">No spots found — add some to Supabase!</td></tr>';
    return;
  }

  renderTable();
  renderMarkers();
}

// ══════════════════════════════════════════
// TABLE
// ══════════════════════════════════════════
function renderTable() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';

  rows.forEach((row, idx) => {
    const tr = document.createElement('tr');
    tr.dataset.id = row.id;
    const ynSelect = (field) => `
      <select data-field="${field}" data-idx="${idx}">
        <option value="" ${!row[field] ? 'selected' : ''}>—</option>
        <option value="Y" ${row[field] === 'Y' ? 'selected' : ''}>Y</option>
        <option value="N" ${row[field] === 'N' ? 'selected' : ''}>N</option>
      </select>`;
    tr.innerHTML = `
      <td><input type="text" value="${escAttr(row['Name'] || '')}"         data-field="Name"        data-idx="${idx}" /></td>
      <td><input type="text" value="${escAttr(row['Category'] || '')}"     data-field="Category"    data-idx="${idx}" /></td>
      <td><input type="text" value="${escAttr(row['latlon'] || '')}"       data-field="latlon"      data-idx="${idx}" placeholder="47.676, -122.384" /></td>
      <td>${ynSelect('Visited')}</td>
      <td>${ynSelect('Dog Friendly')}</td>
      <td class="rating-cell"><input type="number" step="0.1" min="0" max="10" value="${escAttr(row['Mira Rating'] ?? '')}" data-field="Mira Rating" data-idx="${idx}" placeholder="—" /></td>
      <td><input type="text" value="${escAttr(row['Mira Review'] || '')}"  data-field="Mira Review" data-idx="${idx}" placeholder="Add review…" /></td>
      <td class="rating-cell"><input type="number" step="0.1" min="0" max="10" value="${escAttr(row['Luke Rating'] ?? '')}" data-field="Luke Rating" data-idx="${idx}" placeholder="—" /></td>
      <td><input type="text" value="${escAttr(row['Luke Review'] || '')}"  data-field="Luke Review" data-idx="${idx}" placeholder="Add review…" /></td>
    `;
    tr.querySelectorAll('input, select').forEach(el => el.addEventListener('change', onCellChange));
    tbody.appendChild(tr);
  });
}

// ══════════════════════════════════════════
// SAVE
// ══════════════════════════════════════════
let saveTimer = null;

async function onCellChange(e) {
  const el    = e.target;
  const field = el.dataset.field;
  const idx   = parseInt(el.dataset.idx, 10);

  rows[idx][field] = el.value;

  if (['latlon','Visited','Name','Mira Rating','Luke Rating','Mira Review','Luke Review','Dog Friendly'].includes(field)) updateMarker(rows[idx]);

  clearTimeout(saveTimer);
  setStatus('saving', 'Saving…');
  saveTimer = setTimeout(() => saveRow(rows[idx]), 600);
}

async function saveRow(row) {
  const { error } = await supabase
    .from(TABLE_NAME)
    .update({
      'Name':         row['Name'],
      'Category':     row['Category'],
      'latlon':       row['latlon'],
      'Visited':      row['Visited'] || null,
      'Dog Friendly': row['Dog Friendly'] || null,
      'Mira Rating':  row['Mira Rating'] !== '' ? row['Mira Rating'] : null,
      'Luke Rating':  row['Luke Rating'] !== '' ? row['Luke Rating'] : null,
      'Mira Review':  row['Mira Review'],
      'Luke Review':  row['Luke Review'],
    })
    .eq('id', row.id);

  if (error) {
    setStatus('error', 'Save failed');
  } else {
    setStatus('saved', 'Saved ✓');
    setTimeout(() => setStatus('', ''), 2500);
  }
}

function updateMarker(row) {
  if (markers[row.id]) { markers[row.id].remove(); delete markers[row.id]; }
  const pos = parseLatLon(row['latlon']);
  if (!pos) return;
  markers[row.id] = L.marker([pos.lat, pos.lon], { icon: makeIcon(row['Visited']) })
    .bindPopup(buildPopup(row))
    .addTo(map);
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function setStatus(cls, msg) {
  const el = document.getElementById('save-status');
  el.className = 'save-status ' + cls;
  el.textContent = msg;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(str) {
  return String(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
