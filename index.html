<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ballard Exploration</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Ballard palette */
      --navy:       #141c26;
      --navy-mid:   #1c2738;
      --navy-light: #243044;
      --border:     #2e3d52;
      --border-lit: #3d5068;

      --cream:      #e8dcc8;
      --cream-dim:  #b8a98e;
      --muted:      #7a8fa8;

      --amber:      #c8860a;
      --amber-glow: #e09b10;
      --amber-dim:  #7a5006;

      --green:      #4a8c5c;   /* visited — mossy PNW green */
      --red:        #9b3f2e;   /* not visited — weathered rust */

      --radius:     8px;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--navy);
      color: var(--cream);
      min-height: 100vh;
    }

    /* ════════════════════════════
       AUTH SCREEN
    ════════════════════════════ */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      background:
        radial-gradient(ellipse at 20% 80%, rgba(200,134,10,0.08) 0%, transparent 60%),
        radial-gradient(ellipse at 80% 10%, rgba(74,140,92,0.06) 0%, transparent 50%),
        var(--navy);
    }

    .auth-card {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    /* subtle nautical stripe top accent */
    .auth-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--amber), var(--amber-glow), var(--amber));
    }

    .auth-eyebrow {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--amber);
      margin-bottom: 10px;
    }

    .auth-card h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--cream);
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .auth-card p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 32px;
      line-height: 1.5;
    }

    .field { margin-bottom: 18px; }

    .field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream-dim);
      margin-bottom: 7px;
    }

    .field input {
      width: 100%;
      padding: 11px 14px;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.92rem;
      color: var(--cream);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(200,134,10,0.15);
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: var(--amber);
      color: var(--navy);
      border: none;
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      margin-top: 6px;
    }

    .btn:hover   { background: var(--amber-glow); }
    .btn:active  { transform: translateY(1px); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }

    #auth-error {
      color: #e07060;
      font-size: 0.82rem;
      margin-top: 14px;
      display: none;
      padding: 10px 12px;
      background: rgba(155,63,46,0.2);
      border: 1px solid rgba(155,63,46,0.4);
      border-radius: 5px;
    }

    /* ════════════════════════════
       MAIN APP
    ════════════════════════════ */
    #app { display: none; }

    header {
      background: var(--navy-mid);
      border-bottom: 1px solid var(--border);
      padding: 0 28px;
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .header-brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .header-brand h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--cream);
      letter-spacing: 0.01em;
    }

    .header-brand .tagline {
      font-size: 0.72rem;
      color: var(--amber);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }

    .header-right { display: flex; align-items: center; gap: 16px; }

    .user-email {
      font-size: 0.78rem;
      color: var(--muted);
    }

    .btn-sm {
      padding: 6px 16px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border: 1px solid var(--border-lit);
      border-radius: 5px;
      background: transparent;
      color: var(--cream-dim);
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-sm:hover {
      border-color: var(--amber-dim);
      color: var(--amber);
    }

    main {
      padding: 28px 28px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }

    /* ════════════════════════════
       MAP
    ════════════════════════════ */
    .map-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    #map {
      height: 460px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      z-index: 0;
      /* dark map filter to match theme */
      filter: brightness(0.88) saturate(0.75) contrast(1.05);
    }

    /* Legend overlay on map */
    .map-legend {
      position: absolute;
      bottom: 16px;
      left: 16px;
      z-index: 999;
      background: rgba(20,28,38,0.88);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 14px;
      display: flex;
      gap: 16px;
      backdrop-filter: blur(6px);
    }

    .map-reset-btn {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 999;
      background: rgba(20,28,38,0.88);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 12px;
      backdrop-filter: blur(6px);
      color: var(--cream-dim);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      display: none;
      transition: background 0.15s, color 0.15s;
    }
    .map-reset-btn:hover { background: rgba(200,134,10,0.25); color: var(--amber-glow); border-color: var(--amber-dim); }
    .map-reset-btn.visible { display: block; }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.76rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--cream-dim);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
      border: 1.5px solid rgba(255,255,255,0.2);
    }

    /* ════════════════════════════
       TABLE SECTION
    ════════════════════════════ */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 28px 0 14px;
    }

    .section-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--cream);
    }

    .section-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 16px;
    }

    .save-status {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      transition: color 0.2s;
    }
    .save-status.saving { color: var(--amber); }
    .save-status.saved  { color: var(--green); }
    .save-status.error  { color: #e07060; }

    .table-wrap {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }

    thead th {
      background: var(--navy-light);
      padding: 11px 16px;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    /* amber accent on first th */
    thead th:first-child {
      color: var(--amber);
      border-left: 3px solid var(--amber);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(200,134,10,0.04); }

    tbody td {
      padding: 5px 8px;
      vertical-align: middle;
    }

    thead th {
      padding: 9px 8px;
    }

    tbody td:first-child { min-width: 140px; }

    tbody td:first-child {
      border-left: 3px solid transparent;
      transition: border-color 0.15s;
    }

    tbody tr:hover td:first-child { border-left-color: var(--amber-dim); }

    tbody td input,
    tbody td select {
      width: 100%;
      padding: 6px 9px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 5px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--cream);
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }

    tbody td input::placeholder { color: var(--muted); }

    tbody td input:hover,
    tbody td select:hover {
      border-color: var(--border-lit);
      background: var(--navy-light);
    }

    tbody td input:focus,
    tbody td select:focus {
      border-color: var(--amber);
      background: var(--navy-light);
      box-shadow: 0 0 0 2px rgba(200,134,10,0.12);
    }

    tbody td select option { background: var(--navy-mid); color: var(--cream); }

    /* Visited pill */
    .visited-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .rating-cell { text-align: center; font-weight: 600; color: var(--amber); }
    .rating-cell.empty { color: var(--muted); font-weight: 400; }

    .cell-y   { color: var(--green); font-weight: 700; font-size: 0.8rem; }
    .cell-n   { color: var(--red);   font-weight: 700; font-size: 0.8rem; opacity: 0.75; }
    .cell-nil { color: var(--muted); font-size: 0.8rem; }

    .row-actions { display: flex; gap: 5px; justify-content: flex-end; }

    .btn-row {
      padding: 4px 10px;
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      border-radius: 4px;
      border: 1px solid var(--border-lit);
      background: transparent;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }

    .btn-row-view { color: var(--amber); }
    .btn-row-view:hover { background: rgba(200,134,10,0.12); border-color: var(--amber-dim); }

    .btn-row-edit { color: var(--cream-dim); }
    .btn-row-edit:hover { background: var(--navy-light); color: var(--cream); }

    thead th.actions-col { text-align: right; }

    /* filter row */
    thead tr.filter-row th {
      padding: 4px 16px 8px;
      background: var(--navy-light);
      border-bottom: 2px solid var(--border);
    }

    thead tr.filter-row input,
    thead tr.filter-row select {
      width: 100%;
      padding: 5px 8px;
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 4px;
      font-family: 'Inter', sans-serif;
      font-size: 0.75rem;
      color: var(--cream);
      outline: none;
      transition: border-color 0.15s;
    }

    thead tr.filter-row input::placeholder { color: var(--border-lit); }

    thead tr.filter-row input:focus,
    thead tr.filter-row select:focus { border-color: var(--amber); }

    thead tr.filter-row select option { background: var(--navy-mid); }

    /* legend interactive */
    .legend-item {
      cursor: pointer;
      border-radius: 4px;
      padding: 3px 6px;
      transition: opacity 0.2s, background 0.15s;
      user-select: none;
    }

    .legend-item:hover { background: rgba(255,255,255,0.05); }
    .legend-item.active { background: rgba(255,255,255,0.1); outline: 1px solid var(--border-lit); }
    .legend-item.dimmed { opacity: 0.35; }

    .table-placeholder {
      padding: 48px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      letter-spacing: 0.04em;
    }

    /* ════════════════════════════
       ADD BUSINESS MODAL
    ════════════════════════════ */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,15,22,0.75);
      backdrop-filter: blur(4px);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--navy-mid);
      border: 1px solid var(--border-lit);
      border-radius: var(--radius);
      width: 100%;
      max-width: 520px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
      position: relative;
    }

    .modal::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--amber), var(--amber-glow), var(--amber));
      border-radius: var(--radius) var(--radius) 0 0;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 24px 0;
      margin-bottom: 20px;
    }

    .modal-title {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 1.15rem;
      font-weight: 700;
      color: var(--cream);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }

    .modal-close:hover { color: var(--cream); background: var(--navy-light); }

    .modal-body { padding: 0 24px 24px; }

    .modal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .modal-field { display: flex; flex-direction: column; gap: 6px; }
    .modal-field.full { grid-column: 1 / -1; }

    .modal-field label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--cream-dim);
    }

    .modal-field input,
    .modal-field select,
    .modal-field textarea {
      padding: 9px 12px;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-family: 'Inter', sans-serif;
      font-size: 0.875rem;
      color: var(--cream);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .modal-field input::placeholder,
    .modal-field textarea::placeholder { color: var(--muted); }

    .modal-field input:focus,
    .modal-field select:focus,
    .modal-field textarea:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(200,134,10,0.12);
    }

    .modal-field select option { background: var(--navy-mid); }
    .modal-field textarea { resize: vertical; min-height: 68px; }

    .modal-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      padding: 16px 24px;
      border-top: 1px solid var(--border);
    }

    .btn-add {
      padding: 7px 18px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      background: var(--amber);
      color: var(--navy);
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-add:hover { background: var(--amber-glow); }
    .btn-add:disabled { opacity: 0.45; cursor: not-allowed; }

    .modal-error {
      color: #e07060;
      font-size: 0.8rem;
      margin-right: auto;
      display: none;
    }

    /* geocode lookup */
    .latlon-row {
      display: flex;
      gap: 8px;
      align-items: flex-start;
      flex-direction: column;
    }

    .latlon-input-wrap {
      display: flex;
      gap: 6px;
      width: 100%;
    }

    .latlon-input-wrap input { flex: 1; }

    .btn-lookup {
      padding: 9px 12px;
      background: var(--navy-light);
      border: 1px solid var(--border-lit);
      border-radius: 6px;
      color: var(--cream-dim);
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }

    .btn-lookup:hover  { border-color: var(--amber); color: var(--amber); }
    .btn-lookup:disabled { opacity: 0.45; cursor: not-allowed; }

    .geo-results {
      width: 100%;
      background: var(--navy-light);
      border: 1px solid var(--border-lit);
      border-radius: 6px;
      overflow: hidden;
      display: none;
    }

    .geo-results.visible { display: block; }

    .geo-result-item {
      padding: 9px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      color: var(--cream-dim);
      line-height: 1.4;
      transition: background 0.1s, color 0.1s;
    }

    .geo-result-item:last-child { border-bottom: none; }
    .geo-result-item:hover { background: var(--navy-mid); color: var(--cream); }

    .geo-result-name { font-weight: 600; color: var(--cream); }
    .geo-result-addr { font-size: 0.74rem; color: var(--muted); margin-top: 2px; }
    .geo-no-results  { padding: 10px 12px; font-size: 0.8rem; color: var(--muted); }

    /* Leaflet popup dark theme */
    .leaflet-popup-content-wrapper {
      background: var(--navy-mid) !important;
      border: 1px solid var(--border-lit) !important;
      border-radius: 8px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.6) !important;
      color: var(--cream) !important;
    }

    .leaflet-popup-tip {
      background: var(--navy-mid) !important;
    }

    .leaflet-popup-close-button {
      color: var(--muted) !important;
    }

    /* Leaflet controls dark */
    .leaflet-control-zoom a {
      background: var(--navy-mid) !important;
      color: var(--cream) !important;
      border-color: var(--border) !important;
    }

    .leaflet-control-zoom a:hover {
      background: var(--navy-light) !important;
      color: var(--amber) !important;
    }

    .leaflet-control-attribution {
      background: rgba(20,28,38,0.75) !important;
      color: var(--muted) !important;
    }

    .leaflet-control-attribution a { color: var(--amber-dim) !important; }
  </style>
</head>
<body>

<!-- ══════════════════════════════════════════
     AUTH SCREEN
══════════════════════════════════════════ -->
<div id="auth-screen">
  <div class="auth-card">
    <div class="auth-eyebrow">⚓ Ballard, Seattle</div>
    <h1>The Exploration Log</h1>
    <p>Sign in to view the map and update ratings for our favorite spots.</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn" id="sign-in-btn" onclick="signIn()">Sign In</button>
    <div id="auth-error"></div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     MAIN APP
══════════════════════════════════════════ -->
<div id="app">
  <header>
    <div class="header-brand">
      <h1>⚓ The Exploration Log</h1>
      <span class="tagline">Ballard, Seattle</span>
    </div>
    <div class="header-right">
      <span class="user-email" id="user-email-display"></span>
      <button class="btn-sm" onclick="signOut()">Sign Out</button>
    </div>
  </header>

  <main>
    <!-- Map -->
    <div class="map-wrap">
      <div id="map"></div>
      <div class="map-legend">
        <div class="legend-item" id="legend-visited" onclick="toggleLegendFilter('Y')">
          <div class="legend-dot" style="background:var(--green)"></div>
          Visited
        </div>
        <div class="legend-item" id="legend-notyet" onclick="toggleLegendFilter('N')">

<script>
// ══════════════════════════════════════════
// CONFIGURATION — replace these placeholders
// ══════════════════════════════════════════
const SUPABASE_URL  = 'https://gyquubxmgqomozxjxmtl.supabase.co';
const SUPABASE_ANON = 'sb_publishable_R8o2fSkld3S-Po_oPSfJ6g_x0k6G-6p';
const TABLE_NAME    = 'BallardBusinesses';

// ══════════════════════════════════════════
// INIT
// ══════════════════════════════════════════
let db;
try {
  db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON);
} catch (e) {
  document.getElementById('auth-error').textContent = 'Init error: ' + e.message;
  document.getElementById('auth-error').style.display = 'block';
}

let map, rows = [], markers = {};
let filters      = {};   // { fieldName: filterValue }
let legendFilter = null; // 'Y' | 'N' | null

db.auth.getSession().then(({ data: { session } }) => {
  if (session) showApp(session.user);
});

db.auth.onAuthStateChange((_event, session) => {
  if (session) showApp(session.user);
  else         showAuth();
});

// ══════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════
async function signIn() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('sign-in-btn');
  const errEl    = document.getElementById('auth-error');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in…';

  const { error } = await db.auth.signInWithPassword({ email, password });

  btn.disabled = false;
  btn.textContent = 'Sign In';

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
  }
}

async function signOut() { await db.auth.signOut(); }

document.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.getElementById('auth-screen').style.display !== 'none') signIn();
});

// ══════════════════════════════════════════
// SHOW / HIDE SCREENS
// ══════════════════════════════════════════
function showApp(user) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-email-display').textContent = user.email;
  if (!map) initMap();
  loadData();
}

function showAuth() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
}

// ══════════════════════════════════════════
// MAP
// ══════════════════════════════════════════
function initMap() {
  map = L.map('map').setView(MAP_DEFAULT_CENTER, MAP_DEFAULT_ZOOM);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);
}

function makeIcon(visited) {
  const color  = (visited === 'Y') ? '#4a8c5c' : '#9b3f2e';
  const inner  = (visited === 'Y') ? '#7ec89a' : '#e07060';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="26" height="34" viewBox="0 0 26 34">
    <path d="M13 0C5.82 0 0 5.82 0 13c0 8.94 13 21 13 21S26 21.94 26 13C26 5.82 20.18 0 13 0z"
      fill="${color}" stroke="rgba(255,255,255,0.25)" stroke-width="1.5"/>
    <circle cx="13" cy="13" r="5.5" fill="${inner}" opacity="0.9"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize:    [26, 34],
    iconAnchor:  [13, 34],
    popupAnchor: [0, -36]
  });
}

function parseLatLon(val) {
  if (!val) return null;
  const parts = String(val).split(',').map(s => parseFloat(s.trim()));
  if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) return { lat: parts[0], lon: parts[1] };
  return null;
}

function buildPopup(row) {
  const mira       = row['Mira Rating'] ?? '—';
  const luke       = row['Luke Rating'] ?? '—';
  const miraReview = row['Mira Review'] || '';
  const lukeReview = row['Luke Review'] || '';
  const visited    = row['Visited'] === 'Y';
  const dogFriendly = row['Dog Friendly'];
  const category   = (row['Category'] || []).join(', ');
  return `
    <div style="min-width:190px;font-family:'Inter',sans-serif">
      <div style="font-family:'Playfair Display',Georgia,serif;font-size:1rem;font-weight:700;color:#e8dcc8;margin-bottom:2px">
        ${escHtml(row['Name'] || '')}
      </div>
      ${category ? `<div style="font-size:0.7rem;letter-spacing:0.08em;text-transform:uppercase;color:#7a8fa8;margin-bottom:8px">${escHtml(category)}</div>` : ''}
      <div style="display:flex;gap:10px;margin-bottom:12px;align-items:center">
        <span style="font-size:0.72rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:${visited ? '#4a8c5c' : '#9b3f2e'}">
          ${visited ? '● Visited' : '○ Not yet'}
        </span>
        ${dogFriendly === 'Y' ? '<span style="font-size:0.75rem">🐾 Dog friendly</span>' : ''}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:8px">
          <div style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:#7a8fa8;margin-bottom:3px">Mira</div>
          <div style="font-size:1.1rem;font-weight:700;color:#e8dcc8;margin-bottom:${miraReview ? '4px' : '0'}">${escHtml(String(mira))}</div>
          ${miraReview ? `<div style="font-size:0.75rem;color:#b8a98e;line-height:1.4">${escHtml(miraReview)}</div>` : ''}
        </div>
        <div style="background:rgba(255,255,255,0.05);border-radius:6px;padding:8px">
          <div style="font-size:0.65rem;letter-spacing:0.1em;text-transform:uppercase;color:#7a8fa8;margin-bottom:3px">Luke</div>
          <div style="font-size:1.1rem;font-weight:700;color:#e8dcc8;margin-bottom:${lukeReview ? '4px' : '0'}">${escHtml(String(luke))}</div>
          ${lukeReview ? `<div style="font-size:0.75rem;color:#b8a98e;line-height:1.4">${escHtml(lukeReview)}</div>` : ''}
        </div>
      </div>
    </div>`;
}

function renderMarkers() {
  Object.values(markers).forEach(m => m.remove());
  markers = {};
  rows.forEach(row => {
    const pos = parseLatLon(row['latlon']);
    if (!pos) return;
    markers[row.id] = L.marker([pos.lat, pos.lon], { icon: makeIcon(row['Visited']) })
      .bindPopup(buildPopup(row))
      .addTo(map);
  });
  applyLegendHighlight();
}

// ══════════════════════════════════════════
// DATA
// ══════════════════════════════════════════
async function loadData() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '<tr><td colspan="7" class="table-placeholder">Loading spots…</td></tr>';

  const { data, error } = await db
    .from(TABLE_NAME)
    .select('*')
    .order('Name', { ascending: true });

  if (error) {
    tbody.innerHTML = `<tr><td colspan="7" class="table-placeholder" style="color:#e07060">Error: ${escHtml(error.message)}</td></tr>`;
    return;
  }

  rows = data || [];
  if (rows.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="table-placeholder">No spots found — add some to Supabase!</td></tr>';
    return;
  }

  attachFilterListeners();
  renderTable();
  renderMarkers();
}

// ══════════════════════════════════════════
// FILTERS
// ══════════════════════════════════════════
function attachFilterListeners() {
  document.querySelectorAll('.filter-row [data-filter]').forEach(el => {
    el.addEventListener('input',  onFilterChange);
    el.addEventListener('change', onFilterChange);
  });
}

function onFilterChange(e) {
  filters[e.target.dataset.filter] = e.target.value;
  renderTable();
}

function getFilteredRows() {
  return rows.filter(row => {
    for (const [field, val] of Object.entries(filters)) {
      if (!val) continue;
      const cell = row[field];
      // Rating fields: minimum threshold
      if (field === 'Mira Rating' || field === 'Luke Rating') {
        if (cell === null || cell === undefined || parseFloat(cell) < parseFloat(val)) return false;
      // Y/N selects: exact match
      } else if (field === 'Visited' || field === 'Dog Friendly') {
        if ((cell || '') !== val) return false;
      // Category (text[]): any keyword matches
      } else if (field === 'Category') {
        const kw = val.toLowerCase();
        const tags = Array.isArray(cell) ? cell : [];
        if (!tags.some(t => t.toLowerCase().includes(kw))) return false;
      // Text fields: case-insensitive contains
      } else {
        if (!String(cell || '').toLowerCase().includes(val.toLowerCase())) return false;
      }
    }
    return true;
  });
}

// ══════════════════════════════════════════
// TABLE (read-only + action buttons)
// ══════════════════════════════════════════
function renderTable() {
  const tbody   = document.getElementById('table-body');
  const visible = getFilteredRows();
  tbody.innerHTML = '';

  if (visible.length === 0) {
    tbody.innerHTML = '<tr><td colspan="7" class="table-placeholder">No matches — try clearing a filter.</td></tr>';
    return;
  }

  visible.forEach((row) => {
    const idx = rows.indexOf(row);
    const tr  = document.createElement('tr');
    tr.dataset.id = row.id;

    const yn = (v) => v === 'Y'
      ? '<span class="cell-y">Y</span>'
      : v === 'N' ? '<span class="cell-n">N</span>'
      : '<span class="cell-nil">—</span>';

    const rating = (v) => (v !== null && v !== undefined && v !== '')
      ? `<span class="rating-cell">${v}</span>`
      : '<span class="cell-nil">—</span>';

    const hasLatLon = !!parseLatLon(row['latlon']);

    tr.innerHTML = `
      <td>${escHtml(row['Name'] || '')}</td>
      <td>${row['Category']?.length ? escHtml(row['Category'].join(', ')) : '<span class="cell-nil">—</span>'}</td>
      <td>${row['Notes'] ? escHtml(row['Notes']) : '<span class="cell-nil">—</span>'}</td>
      <td style="text-align:center">${yn(row['Visited'])}</td>
      <td style="text-align:center">${yn(row['Dog Friendly'])}</td>
      <td style="text-align:center">${rating(row['Mira Rating'])}</td>
      <td style="text-align:center">${rating(row['Luke Rating'])}</td>
      <td>
        <div class="row-actions">
          ${hasLatLon ? `<button class="btn-row btn-row-view" onclick="highlightOnMap(${row.id})">📍 View</button>` : ''}
          <button class="btn-row btn-row-edit" onclick="openEditModal(${idx})">Edit</button>
        </div>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

// ══════════════════════════════════════════
// SAVE (called from modal)
// ══════════════════════════════════════════
async function saveRow(row) {
  const { error } = await db
    .from(TABLE_NAME)
    .update({
      'Name':         row['Name'],
      'Category':     (row['Category']?.length) ? row['Category'] : null,
      'latlon':       row['latlon'] || null,
      'Visited':      row['Visited'] || null,
      'Dog Friendly': row['Dog Friendly'] || null,
      'Mira Rating':  (row['Mira Rating'] !== '' && row['Mira Rating'] !== null) ? row['Mira Rating'] : null,
      'Luke Rating':  (row['Luke Rating'] !== '' && row['Luke Rating'] !== null) ? row['Luke Rating'] : null,
      'Notes':        row['Notes']       || null,
      'Mira Review':  row['Mira Review'] || null,
      'Luke Review':  row['Luke Review'] || null,
    })
    .eq('id', row.id);

  if (error) { setStatus('error', 'Save failed'); return false; }
  setStatus('saved', 'Saved ✓');
  setTimeout(() => setStatus('', ''), 2500);
  return true;
}

function updateMarker(row) {
  if (markers[row.id]) { markers[row.id].remove(); delete markers[row.id]; }
  const pos = parseLatLon(row['latlon']);
  if (!pos) return;
  markers[row.id] = L.marker([pos.lat, pos.lon], { icon: makeIcon(row['Visited']) })
    .bindPopup(buildPopup(row))
    .addTo(map);
  applyLegendHighlight();
}

// ══════════════════════════════════════════
// MAP HIGHLIGHT
// ══════════════════════════════════════════
function makeHighlightIcon() {
  return L.divIcon({
    html: `<svg xmlns="http://www.w3.org/2000/svg" width="32" height="42" viewBox="0 0 26 34">
      <path d="M13 0C5.82 0 0 5.82 0 13c0 8.94 13 21 13 21S26 21.94 26 13C26 5.82 20.18 0 13 0z"
        fill="#c8860a" stroke="#fff" stroke-width="2"/>
      <circle cx="13" cy="13" r="5.5" fill="#f5e08a" opacity="0.95"/>
    </svg>`,
    className: '', iconSize: [32, 42], iconAnchor: [16, 42], popupAnchor: [0, -44]
  });
}

const MAP_DEFAULT_CENTER = [47.6762, -122.3839];
const MAP_DEFAULT_ZOOM   = 14;

function highlightOnMap(rowId) {
  const row    = rows.find(r => r.id === rowId);
  const marker = markers[rowId];
  if (!row || !marker) return;
  const pos = parseLatLon(row['latlon']);
  if (!pos) return;

  // Offset the fly-to center so the marker lands in the lower ~25% of the map
  // rather than dead-center, keeping the popup fully visible above it.
  const zoom = 17;
  const targetPx = map.project(L.latLng(pos.lat, pos.lon), zoom);
  const offsetPx  = targetPx.subtract([0, map.getSize().y * 0.25]);
  const centerLatLng = map.unproject(offsetPx, zoom);

  map.flyTo(centerLatLng, zoom, { duration: 0.9 });
  marker.setIcon(makeHighlightIcon());
  marker.openPopup();
  setTimeout(() => marker.setIcon(makeIcon(row['Visited'])), 2500);

  document.getElementById('map-reset-btn').classList.add('visible');
}

function resetMapView() {
  map.flyTo(MAP_DEFAULT_CENTER, MAP_DEFAULT_ZOOM, { duration: 0.9 });
  document.getElementById('map-reset-btn').classList.remove('visible');
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
function setStatus(cls, msg) {
  const el = document.getElementById('save-status');
  el.className = 'save-status ' + cls;
  el.textContent = msg;
}

function escHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function escAttr(str) {
  return String(str).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// ══════════════════════════════════════════
// ADD / EDIT MODAL
// ══════════════════════════════════════════
let currentEditIdx = null; // null = adding, number = editing

function resetModal() {
  ['f-name','f-category','f-notes','f-latlon','f-mira-review','f-luke-review'].forEach(id => document.getElementById(id).value = '');
  ['f-visited','f-dog','f-mira-rating','f-luke-rating'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('geo-results').classList.remove('visible');
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal-submit-btn').disabled = false;

  // Populate category suggestions — flatten all keyword arrays into unique sorted values
  const categories = [...new Set(rows.flatMap(r => Array.isArray(r['Category']) ? r['Category'] : []).filter(Boolean))].sort();
  document.getElementById('category-datalist').innerHTML =
    categories.map(c => `<option value="${escAttr(c)}">`).join('');
}

function openAddModal() {
  currentEditIdx = null;
  resetModal();
  document.querySelector('.modal-title').textContent = 'Add a Business';
  document.getElementById('modal-submit-btn').textContent = 'Add Business';
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('f-name').focus();
}

function openEditModal(idx) {
  currentEditIdx = idx;
  const row = rows[idx];
  resetModal();
  document.getElementById('f-name').value         = row['Name']         || '';
  document.getElementById('f-category').value     = (row['Category'] || []).join(', ');
  document.getElementById('f-latlon').value        = row['latlon']       || '';
  document.getElementById('f-visited').value       = row['Visited']      || '';
  document.getElementById('f-dog').value           = row['Dog Friendly'] || '';
  document.getElementById('f-mira-rating').value  = row['Mira Rating']  ?? '';
  document.getElementById('f-luke-rating').value  = row['Luke Rating']  ?? '';
  document.getElementById('f-mira-review').value  = row['Mira Review']  || '';
  document.getElementById('f-notes').value         = row['Notes']        || '';
  document.getElementById('f-luke-review').value  = row['Luke Review']  || '';
  document.querySelector('.modal-title').textContent = 'Edit Business';
  document.getElementById('modal-submit-btn').textContent = 'Save Changes';
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeAddModal() {
  document.getElementById('add-modal').classList.remove('open');
}

function onBackdropClick(e) {
  if (e.target === document.getElementById('add-modal')) closeAddModal();
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeAddModal();
});

async function submitNewBusiness() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { showModalError('Name is required.'); return; }

  const miraRating = document.getElementById('f-mira-rating').value;
  const lukeRating = document.getElementById('f-luke-rating').value;
  const payload = {
    'Name':         name,
    'Category':     (() => { const tags = document.getElementById('f-category').value.split(',').map(t => t.trim()).filter(Boolean); return tags.length ? tags : null; })(),
    'latlon':       document.getElementById('f-latlon').value.trim() || null,
    'Visited':      document.getElementById('f-visited').value || null,
    'Dog Friendly': document.getElementById('f-dog').value || null,
    'Mira Rating':  miraRating !== '' ? parseFloat(miraRating) : null,
    'Luke Rating':  lukeRating !== '' ? parseFloat(lukeRating) : null,
    'Notes':        document.getElementById('f-notes').value.trim()       || null,
    'Mira Review':  document.getElementById('f-mira-review').value.trim() || null,
    'Luke Review':  document.getElementById('f-luke-review').value.trim() || null,
  };

  const btn = document.getElementById('modal-submit-btn');
  btn.disabled = true;

  if (currentEditIdx !== null) {
    // ── EDIT existing row ──
    btn.textContent = 'Saving…';
    const row = rows[currentEditIdx];
    Object.assign(row, payload);
    const ok = await saveRow(row);
    if (!ok) { showModalError('Save failed — try again.'); btn.disabled = false; btn.textContent = 'Save Changes'; return; }
    updateMarker(row);
    closeAddModal();
    renderTable();
  } else {
    // ── INSERT new row ──
    btn.textContent = 'Adding…';
    const { data, error } = await db.from(TABLE_NAME).insert(payload).select().single();
    if (error) { showModalError(error.message); btn.disabled = false; btn.textContent = 'Add Business'; return; }
    rows.push(data);
    rows.sort((a, b) => (a['Name'] || '').localeCompare(b['Name'] || ''));
    closeAddModal();
    renderTable();
    renderMarkers();
    setStatus('saved', 'Added ✓');
    setTimeout(() => setStatus('', ''), 2500);
  }
}

// ══════════════════════════════════════════
// LEGEND FILTER
// ══════════════════════════════════════════
function toggleLegendFilter(value) {
  legendFilter = (legendFilter === value) ? null : value;

  const vEl = document.getElementById('legend-visited');
  const nEl = document.getElementById('legend-notyet');

  // Reset both
  vEl.classList.remove('active', 'dimmed');
  nEl.classList.remove('active', 'dimmed');

  if (legendFilter === 'Y') {
    vEl.classList.add('active');
    nEl.classList.add('dimmed');
  } else if (legendFilter === 'N') {
    nEl.classList.add('active');
    vEl.classList.add('dimmed');
  }

  applyLegendHighlight();
}

function applyLegendHighlight() {
  Object.entries(markers).forEach(([id, marker]) => {
    const row = rows.find(r => String(r.id) === String(id));
    if (!row) return;
    if (legendFilter === null) {
      marker.setOpacity(1);
    } else {
      marker.setOpacity(row['Visited'] === legendFilter ? 1 : 0.15);
    }
  });
}

function showModalError(msg) {
  const el = document.getElementById('modal-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ══════════════════════════════════════════
// GEOCODING — Nominatim, biased to Ballard
// ══════════════════════════════════════════
// Bounding box loosely around greater Ballard / NW Seattle
const GEO_VIEWBOX = '-122.42,47.70,-122.33,47.63';

async function geocodeLookup() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) {
    showModalError('Enter a business name first, then click Find.');
    return;
  }

  const btn     = document.getElementById('geo-btn');
  const results = document.getElementById('geo-results');

  btn.disabled = true;
  btn.textContent = '…';
  results.classList.remove('visible');
  results.innerHTML = '';
  document.getElementById('modal-error').style.display = 'none';

  const params = new URLSearchParams({
    q:            name + ' Seattle WA',
    format:       'jsonv2',
    limit:        '5',
    viewbox:      GEO_VIEWBOX,
    bounded:      '0',       // allow results outside box if nothing found within
    countrycodes: 'us',
    addressdetails: '1',
  });

  try {
    const res  = await fetch('https://nominatim.openstreetmap.org/search?' + params, {
      headers: { 'Accept-Language': 'en' }
    });
    const data = await res.json();

    if (!data.length) {
      results.innerHTML = '<div class="geo-no-results">No results found — try a shorter or different name.</div>';
    } else {
      results.innerHTML = data.map((place, i) => {
        const displayName = place.name || place.display_name.split(',')[0];
        const addr = place.display_name;
        return `<div class="geo-result-item" onclick="selectGeoResult(${place.lat}, ${place.lon})">
          <div class="geo-result-name">${escHtml(displayName)}</div>
          <div class="geo-result-addr">${escHtml(addr)}</div>
        </div>`;
      }).join('');
    }

    results.classList.add('visible');
  } catch (e) {
    showModalError('Lookup failed — check your connection and try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = '🔍 Find';
  }
}

function selectGeoResult(lat, lon) {
  const rounded = parseFloat(lat).toFixed(6) + ', ' + parseFloat(lon).toFixed(6);
  document.getElementById('f-latlon').value = rounded;
  const results = document.getElementById('geo-results');
  results.classList.remove('visible');
  results.innerHTML = '';
}
